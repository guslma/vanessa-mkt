name: marketing-tracker

services:
  marketing-tracker:
    container_name: marketing-tracker
    image: guslma/marketing-tracker:latest
    ports:
      - target: 3001
        published: "3001"
        protocol: tcp
    environment:
      DATABASE_URL: postgresql://marketing:SUA_SENHA_AQUI@postgres:5432/marketing
      JWT_SECRET: SEU_SEGREDO_BEM_LONGO
      JWT_EXPIRES_IN: 7d
      MAX_UPLOAD_SIZE_MB: 15
      PORT: 3001
      ADMIN_EMAIL: esposa@example.com
      ADMIN_PASSWORD: SUA_SENHA_ADMIN
      ADMIN_NAME: Administradora
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: "Marketing Tracker <no-reply@marketing-tracker.local>"
      DAILY_DIGEST_HOUR: 8
      CORS_ORIGINS: ""
    volumes:
      - /DATA/AppData/marketing-tracker/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - marketing-net
    restart: unless-stopped
    labels:
      icon: "https://cdn.jsdelivr.net/gh/guslma/vanessa-mkt@v1.0.0/frontend/public/icons/icon-512.png"

  postgres:
    container_name: marketing-tracker-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: SUA_SENHA_AQUI
      POSTGRES_DB: marketing
    volumes:
      - /DATA/AppData/marketing-tracker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketing -d marketing"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      marketing-net:
        aliases:
          - postgres
    restart: unless-stopped

networks:
  marketing-net:
    name: marketing-tracker_default

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: "https://cdn.jsdelivr.net/gh/guslma/vanessa-mkt@v1.0.0/frontend/public/icons/icon-512.png"
  index: /
  is_uncontrolled: false
  port_map: "3001"
  scheme: http
  store_app_id: marketing-tracker
  title:
    custom: ""
    en_us: Vanessa MKT