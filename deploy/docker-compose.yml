name: marketing-tracker
services:
  marketing-tracker:
    container_name: marketing-tracker
    image: guslma/marketing-tracker:latest
    ports:
      - target: 3001
        published: "3001"
        protocol: tcp
    environment:
      DATABASE_URL: postgresql://marketing:CHANGE_ME_DB_PASSWORD@postgres:5432/marketing
      JWT_SECRET: CHANGE_ME_JWT_SECRET_BEM_LONGO_E_ALEATORIO
      JWT_EXPIRES_IN: 7d
      MAX_UPLOAD_SIZE_MB: 15
      PORT: 3001
      ADMIN_EMAIL: esposa@example.com
      ADMIN_PASSWORD: CHANGE_ME_ADMIN_PASSWORD
      ADMIN_NAME: Administradora
      # SMTP é opcional — deixe em branco para desativar o resumo diário por e-mail.
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: "Marketing Tracker <no-reply@marketing-tracker.local>"
      DAILY_DIGEST_HOUR: 8
      # Domínio público real do app, para restringir o CORS (ex: https://meuapp.duckdns.org).
      CORS_ORIGINS: ""
    volumes:
      - type: bind
        source: /DATA/AppData/marketing-tracker/uploads
        target: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      icon: "https://cdn.jsdelivr.net/gh/guslma/vanessa-mkt@v1.0.0/frontend/public/icons/icon-512.png"

  postgres:
    container_name: marketing-tracker-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
      POSTGRES_DB: marketing
    volumes:
      - type: bind
        source: /DATA/AppData/marketing-tracker/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketing"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  default:
    name: marketing-tracker_default

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: "https://cdn.jsdelivr.net/gh/guslma/vanessa-mkt@v1.0.0/frontend/public/icons/icon-512.png"
  index: /
  is_uncontrolled: false
  port_map: "3001"
  scheme: http
  store_app_id: marketing-tracker
  title:
    custom: ""
    en_us: Vanessa MKT
